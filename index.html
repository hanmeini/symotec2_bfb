<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading...</title>

<style>
    body {
        margin: 0;
        padding: 0;
        background: #0d0d0d;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        animation: fadein 0.6s ease-out forwards;
    }

    /* Modern Loader */
    .loader {
        width: 80px;
        height: 80px;
        border: 6px solid rgba(255, 255, 255, 0.2);
        border-top-color: #00eaff;
        border-radius: 50%;
        animation: spin 1s infinite linear;
        box-shadow: 0 0 25px #00eaff;
    }

    @keyframes spin {
        100% { transform: rotate(360deg); }
    }

    @keyframes fadein {
        from { opacity: 0; }
        to { opacity: 1; }
    }

    /* Optional fade-out */
    .fade-out {
        animation: fadeout 0.6s ease-out forwards;
    }

    @keyframes fadeout {
        from { opacity: 1; }
        to { opacity: 0; }
    }

    /* Hidden redirect text for accessibility */
    .hidden-text {
        position: absolute;
        bottom: -999px;
        font-size: 0;
        color: transparent;
    }
</style>

<script>
// Smooth fade-out before redirect
setTimeout(() => {
    document.body.classList.add("fade-out");
    setTimeout(() => {
        window.location.href = "https://bfb.symotech.my.id/index.php";
    }, 400);
}, 1000);
</script>
</head>

<body>
    <div class="loader"></div>

    <!-- Hidden text for fallback -->
    <p class="hidden-text">
        Redirecting...
        If not redirected, visit: https://bfb.symotech.my.id/index.php
    </p>
</body>
</html>
